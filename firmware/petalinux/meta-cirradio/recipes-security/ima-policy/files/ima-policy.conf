# IMA measurement + appraisal policy for CIRRADIO
# Measure all executables; require valid signatures (appraise mode)

# Measure kernel modules
measure func=MODULE_CHECK
# Measure firmware blobs
measure func=FIRMWARE_CHECK
# Measure all executables at exec
measure func=BPRM_CHECK
# Appraise (enforce signature) on all executables run as root
appraise func=BPRM_CHECK fowner=0 appraise_type=imasig
# Appraise shared libraries loaded by root processes
appraise func=MMAP_CHECK fowner=0 appraise_type=imasig
# Appraise kernel modules
appraise func=MODULE_CHECK appraise_type=imasig
